# ClipsGold Nginx Reverse Proxy Configuration
# Production-ready setup for Docker deployment

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/m;

server {
    listen 80;
    server_name _;
    
    client_max_body_size 500M;  # Allow large video uploads
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
    
    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Next.js HMR support
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # Backend API (FastAPI)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting for general API
        limit_req zone=api_limit burst=20 nodelay;
        
        # Timeouts for long-running operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;  # 10 minutes for rendering
        proxy_read_timeout 600s;
    }
    
    # Upload endpoint (stricter rate limit)
    location /api/upload {
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Stricter rate limit for uploads
        limit_req zone=upload_limit burst=5 nodelay;
        
        # Extended timeouts for large uploads
        client_body_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # WebSocket support for render progress
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout (30 minutes for long renders)
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
    
    # Static file serving for rendered videos (direct from nginx for performance)
    location /static/outputs/ {
        alias /app/backend/outputs/;
        
        # Cache headers for video files
        expires 1h;
        add_header Cache-Control "public, immutable";
        
        # Range requests support for video streaming
        add_header Accept-Ranges bytes;
        
        # Security: prevent directory listing
        autoindex off;
        
        # Only serve mp4 and json files
        location ~ \.(mp4|json)$ {
            try_files $uri =404;
        }
    }
    
    # Health check endpoint (no rate limit)
    location /api/health {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend;
        access_log off;
    }
    
    # Favicon and robots
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    
    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

