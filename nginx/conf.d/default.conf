# ── Rate limiting ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/m;

# ── HTTP → HTTPS redirect + ACME challenge ───────────────────
server {
    listen 80;
    server_name clipsgold.ru www.clipsgold.ru api.clipsgold.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Frontend (clipsgold.ru) ───────────────────────────
server {
    listen 443 ssl http2;
    server_name clipsgold.ru www.clipsgold.ru;

    ssl_certificate     /etc/letsencrypt/live/clipsgold.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipsgold.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2G;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
    }
}

# ── HTTPS: Backend API (api.clipsgold.ru) ────────────────────
server {
    listen 443 ssl http2;
    server_name api.clipsgold.ru;

    ssl_certificate     /etc/letsencrypt/live/clipsgold.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clipsgold.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2G;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket for render-progress
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Upload (stricter rate limit)
    location ~ ^/upload {
        proxy_pass            http://backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        limit_req             zone=upload burst=5 nodelay;
        client_body_timeout   600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }

    # Health check (no rate limit, no access log)
    location = /health {
        proxy_pass   http://backend:8000;
        access_log   off;
    }

    # All other API endpoints
    location / {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        limit_req          zone=api burst=30 nodelay;
        proxy_connect_timeout 60s;
        proxy_send_timeout    1800s;
        proxy_read_timeout    1800s;
    }

    location ~ /\. { deny all; }
}
