# ──────────────────────────────────────────────────────────────
# ClipsGold Factory Configuration
# Controls what content the autonomous scout searches for.
# ──────────────────────────────────────────────────────────────

scout:
  schedule_hours: 4            # run scout every 4 hours (was 6)
  max_per_keyword: 8           # more videos per keyword (was 5)
  min_video_length: 120        # 2 minutes minimum
  max_video_length: 7200       # 2 hours maximum
  min_view_count: 30000        # lowered from 50k to catch newer viral content
  max_age_days: 120            # wider window (was 90 days)
  search_results_per_query: 15 # more results per query (was 10)

keywords:
  # ── Russian content ──────────────────────────────────────────
  - query: "бизнес подкаст нарезка"
    niche: "business"
    language: "ru"

  - query: "стендап лучшие моменты"
    niche: "comedy"
    language: "ru"

  - query: "предпринимательство интервью вирусное"
    niche: "entrepreneurship"
    language: "ru"

  - query: "мотивация успех короткий клип"
    niche: "motivation"
    language: "ru"

  - query: "психология отношений советы"
    niche: "psychology"
    language: "ru"

  - query: "финансы инвестиции советы"
    niche: "finance"
    language: "ru"

  - query: "саморазвитие привычки лайфхаки"
    niche: "self_development"
    language: "ru"

  - query: "продажи маркетинг секреты"
    niche: "business"
    language: "ru"

  - query: "стартап история успеха"
    niche: "entrepreneurship"
    language: "ru"

  - query: "лайфстайл влог вирусный момент"
    niche: "lifestyle"
    language: "ru"

  # ── English content ──────────────────────────────────────────
  - query: "alex hormozi best moments"
    niche: "business"
    language: "en"

  - query: "joe rogan viral clip"
    niche: "podcast"
    language: "en"

  - query: "andrew tate best moments"
    niche: "motivation"
    language: "en"

  - query: "comedy roast best moments"
    niche: "comedy"
    language: "en"

  - query: "lex fridman best moments"
    niche: "podcast"
    language: "en"

  - query: "david goggins motivation speech"
    niche: "motivation"
    language: "en"

  - query: "mark cuban shark tank best moments"
    niche: "business"
    language: "en"

  - query: "startup pitch best moments"
    niche: "entrepreneurship"
    language: "en"

  - query: "self improvement advice viral"
    niche: "self_development"
    language: "en"

  - query: "stand up comedy best clips 2024"
    niche: "comedy"
    language: "en"

  - query: "gary vee best moments"
    niche: "business"
    language: "en"

  - query: "jordan peterson best arguments"
    niche: "psychology"
    language: "en"

processing:
  auto_approve_threshold: 8.0   # slightly lower (was 8.5) to generate more clips
  max_clips_per_video: 5
  auto_cleanup_source: true
  default_platform: "tiktok"
  default_subtitle_style: "hormozi"
  max_concurrent_downloads: 2
  max_videos_per_cycle: 5

notifications:
  telegram_enabled: true
  notify_threshold: 7.5         # lower threshold (was 8.0) to get more notifications
  send_video_preview: false
