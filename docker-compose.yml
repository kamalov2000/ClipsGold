version: '3.9'

x-backend-env: &backend-env
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  DATABASE_URL: postgresql+psycopg2://clipsgold:${POSTGRES_PASSWORD:-clipsgold}@postgres:5432/clipsgold
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  S3_PRESIGN_EXPIRY: ${S3_PRESIGN_EXPIRY:-3600}
  SENTRY_DSN: ${SENTRY_DSN:-}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  APP_VERSION: ${APP_VERSION:-1.0.0}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  YOUTUBE_COOKIES_FILE: ${YOUTUBE_COOKIES_FILE:-}

x-backend-volumes: &backend-volumes
  - ./backend/uploads:/app/uploads
  - ./backend/outputs:/app/outputs
  - ./backend/clips:/app/clips
  - ./backend/thumbnails:/app/thumbnails
  - ./backend/assets:/app/assets
  - ./backend/models:/app/models

services:
  # ── Infrastructure ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clipsgold_postgres
    environment:
      POSTGRES_DB: clipsgold
      POSTGRES_USER: clipsgold
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clipsgold}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipsgold"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clipsgold_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Application ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipsgold_backend
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipsgold_celery
    command: >
      celery -A worker.celery_app worker
      --loglevel=info
      --queues=high,default
      --concurrency=2
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipsgold_flower
    command: >
      celery -A worker.celery_app flower
      --port=5555
      --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    environment:
      <<: *backend-env
    depends_on:
      - redis
      - celery_worker
    restart: unless-stopped

  factory_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipsgold_factory
    command: python factory_worker.py
    environment:
      <<: *backend-env
      AUTONOMOUS_MODE: "True"
      DOWNLOADS_DIR: /app/downloads
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PROXIES: ${PROXIES:-}
    volumes:
      - *backend-volumes
      - ./backend/downloads:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clipsgold_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
